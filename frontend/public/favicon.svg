<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#grad1)"/>
  
  <!-- Document shape - stylized "D" -->
  <g transform="translate(128, 128)">
    <!-- Main document rectangle -->
    <rect x="-45" y="-55" width="90" height="110" rx="6" fill="white" opacity="0.95"/>
    
    <!-- Document lines (representing text/content) -->
    <line x1="-35" y1="-40" x2="20" y2="-40" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-35" y1="-25" x2="35" y2="-25" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-35" y1="-10" x2="35" y2="-10" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-35" y1="5" x2="25" y2="5" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Accent spark/insight indicator (top right) -->
    <circle cx="35" cy="-40" r="6" fill="#fbbf24"/>
    
    <!-- Chevron down indicating conversation/Q&A -->
    <path d="M -10 35 L 0 45 L 10 35" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>
</svg>
